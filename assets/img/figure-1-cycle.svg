<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" role="img" aria-labelledby="title desc">
  <title id="title">图1：企业生产力与家庭生命力辩证循环的理论分析模型 / Dialectical Cycle of Enterprise Productive Force and Family Life-Reproduction Capacity</title>
  <desc id="desc">四象限模型，展示企业系统、商品市场、家庭系统、就业市场、金融市场、实物流和货币流之间的循环关系。A four-quadrant model showing the cycle among enterprises, commodity markets, households, labor markets, financial markets, real flows, and monetary flows.</desc>
  <defs>
    <marker id="orangeArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f47b20"/>
    </marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#21a856"/>
    </marker>
    <style>
      text{font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif;fill:#111;font-weight:700}
      .small{font-size:18px}.label{font-size:23px}.note{font-size:15px;font-weight:500;fill:#4b5b5f}.flowNote{font-size:14px;font-weight:600;fill:#21a856}.axis{stroke:#111;stroke-width:3}.orange{stroke:#f47b20;stroke-width:3.4;fill:none}.green{stroke:#21a856;stroke-width:3;fill:none}.box{fill:#fff;stroke:#111;stroke-width:2}.money{fill:#fff;stroke:#21a856;stroke-width:2}.greenText{fill:#21a856}.legend{font-size:17px;font-weight:500}.en{font-family:Georgia,"Times New Roman",serif;font-size:10px;font-weight:500;fill:#5e6a6f}.enLabel{font-family:Georgia,"Times New Roman",serif;font-size:12px;font-weight:600;fill:#5e6a6f}.enFlow{font-family:Georgia,"Times New Roman",serif;font-size:10px;font-weight:600;fill:#21a856}
    </style>
  </defs>

