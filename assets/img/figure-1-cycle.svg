  <line class="orange" x1="470" y1="582" x2="562" y2="582" marker-end="url(#orangeArrow)"/>
  <text class="legend" x="584" y="588" fill="#f47b20">实物流：商品、服务与劳动力</text>
  <text class="en" x="584" y="604" fill="#f47b20">Real flow: goods, services, and labor</text>
  <line class="green" x1="470" y1="610" x2="562" y2="610" marker-end="url(#greenArrow)"/>
  <text class="legend" x="584" y="616" fill="#21a856">货币流：收入、支出、储蓄与存款</text>
