  <text class="tiny" x="676" y="284">产出商品和服务</text>
  <text class="enLabel" x="696" y="274">Enterprise System</text>
  <text class="en" x="676" y="299">Goods and services output</text>

  <g aria-label="图例">
    <line class="greenLine" x1="598" y1="498" x2="642" y2="498"/>
    <text class="legendText" x="654" y="502">货币政策</text>
    <text class="en" x="654" y="516">Monetary policy</text>
    <line class="taxLine" x1="598" y1="530" x2="642" y2="530"/>
    <text class="legendText" x="654" y="534">税收政策</text>
    <text class="en" x="654" y="548">Tax policy</text>
    <line class="fiscalLine" x1="598" y1="562" x2="642" y2="562"/>
    <text class="legendText" x="654" y="566">财政政策</text>
    <text class="en" x="654" y="580">Fiscal policy</text>
    <line class="policyLink" x1="598" y1="594" x2="642" y2="594"/>
    <text class="legendText" x="654" y="598">市场监管</text>
    <text class="en" x="654" y="612">Market regulation</text>
    <line class="orangeCycle" x1="598" y1="626" x2="642" y2="626"/>
    <text class="legendText" x="654" y="630">两种生产实物流</text>
    <text class="en" x="654" y="644">Real flow of the two productions</text>
  </g>
</svg>
