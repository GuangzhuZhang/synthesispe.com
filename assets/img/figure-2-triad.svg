<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" role="img" aria-labelledby="title desc">
  <title id="title">图2：家庭权利、企业权利、政府权力“大三权”非对称配置与制衡机制理论分析模型 / The Grand Tripartite: Asymmetric Balance among Family Rights, Enterprise Rights, and State Power</title>
  <desc id="desc">三维示意模型，政府位于家庭、企业与市场平面之上，通过财政税收、货币政策、公共产品等关系连接家庭系统与企业系统。A three-dimensional schematic model showing state power above the household-enterprise-market plane, connected through fiscal policy, taxation, monetary policy, public goods, and market regulation.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <style>
      text{font-family:"Noto Serif SC","Source Han Serif SC","Songti SC",serif;fill:#111;font-weight:700}
      .small{font-size:16px}.tiny{font-size:14px}.roman{font-size:17px;fill:#333}.legendText{font-size:13px;font-weight:600;fill:#333}.note{font-size:14px;font-weight:500;fill:#4b5b5f}.en{font-family:Georgia,"Times New Roman",serif;font-size:9.5px;font-weight:500;fill:#5e6a6f}.enLabel{font-family:Georgia,"Times New Roman",serif;font-size:10.5px;font-weight:600;fill:#5e6a6f}.axis{stroke:#111;stroke-width:2.2}.orangeCycle{stroke:#f47b20;stroke-width:2.4;fill:none}.greenLine{stroke:#21a856;stroke-width:3;fill:none}.taxLine{stroke:#7b4cc2;stroke-width:2.6;fill:none;stroke-linecap:round}.fiscalLine{stroke:#d94848;stroke-width:2.6;fill:none;stroke-linecap:round}.policyLink{stroke:#111;stroke-width:2.1;fill:none;stroke-linecap:round}.guideLine{stroke:#111;stroke-width:1.8;fill:none}.cubeEdge{stroke:#333;stroke-width:1.2;fill:none}.market{stroke:#333;stroke-width:1.4}.commodityMarket{fill:#dceeff}.employmentMarket{fill:#dceeff}.financeMarket{fill:#e1f4df}.govTop,.govSide,.govFace,.familyTop,.familySide,.familyFace,.enterpriseTop,.enterpriseSide,.enterpriseFace{stroke:#333;stroke-width:1.4}.govTop{fill:#efe6ff}.govSide{fill:#ded0f5}.govFace{fill:#f7f0ff}.familyTop{fill:#dceeff}.familySide{fill:#c4dff4}.familyFace{fill:#eef7ff}.enterpriseTop{fill:#dceeff}.enterpriseSide{fill:#c4dff4}.enterpriseFace{fill:#eef7ff}
    </style>
  </defs>

  <line class="axis" x1="24" y1="325" x2="841" y2="325"/>
  <line class="axis" x1="108" y1="582" x2="708" y2="73"/>
