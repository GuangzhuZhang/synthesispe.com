  <text class="en" x="758" y="369">Demand</text>
  <text class="en" x="608" y="98">Supply</text>
  <text class="en" x="670" y="106">Output</text>
  <text class="en" x="110" y="566">Output</text>
  <text class="en" x="158" y="570">Supply</text>

